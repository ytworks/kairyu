replicaCount: 1
image:
  repository: kairyu
  tag: dev
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8000
resources: {}
nodeSelector: {}
runtimeClassName: ""
attentionBackend: ""
tolerations: []
affinity: {}
modelStorage:
  enabled: false
  pvcName: ""
  hostPath: ""
  mountPath: /models
# DeploymentSpec YAML mounted at exactly /etc/kairyu/config.yaml (the
# Dockerfile CMD — m10a A11)
config: |
  engines:
    default:
      backend: mock
      options: {}
