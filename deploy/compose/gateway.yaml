# Gateway role: ReplicaPool over the replica nodes, keyless inside the DC
# network (m6 D2 / m7 D5). unhealthy_after=1 keeps the smoke drill's 5xx
# window to a single request after a replica is killed.
server:
  host: 0.0.0.0
  port: 8000
  max_concurrency: 64
pools:
  llama:
    replicas:
      - backend: openai
        options: { base_url: "http://replica-1:8000/v1", model: "llama", api_key_env: null }
      - backend: openai
        options: { base_url: "http://replica-2:8000/v1", model: "llama", api_key_env: null }
      - backend: openai
        options: { base_url: "http://replica-3:8000/v1", model: "llama", api_key_env: null }
    unhealthy_after: 1
    probe_interval_s: 1.0
