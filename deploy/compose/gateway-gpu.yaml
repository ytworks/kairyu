# Gateway role for the single-node GPU topology (docker-compose.gpu.yaml).
# Kept separate from gateway.yaml (the CPU smoke topology's 1+3 config) because
# that compose defines replica-1/2/3 serving engine id "llama", while the GPU
# compose defines a single "replica" service serving engine id "default"
# (gpu-replica.yaml). Sharing one file would break one topology or the other.
#
# Keyless inside the DC network (m6 D2 / m7 D5). unhealthy_after=1 keeps the
# 5xx window to a single request after a replica is killed.
server:
  host: 0.0.0.0
  port: 8000
  max_concurrency: 64
pools:
  # Client-facing pool name stays "llama"; the single GPU replica serves its
  # DeploymentSpec engine id "default", so the upstream forwards model=default.
  llama:
    replicas:
      - backend: openai
        options: { base_url: "http://replica:8000/v1", model: "default", api_key_env: null }
    unhealthy_after: 1
    probe_interval_s: 1.0
