name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check kairyu tests bench
      - name: Test with coverage gate
        run: uv run pytest --cov=kairyu --cov-fail-under=80

  compose-smoke:
    # Black-box gate C3 (goal G3): gateway + 3 mock replicas from a cold
    # docker compose up, incl. the kill/recover drill. Outside the coverage gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Validate Compose bind sources
        run: uv run --no-dev python scripts/validate_compose_binds.py deploy/compose/docker-compose*.yaml
      - name: Compose smoke drill
        run: ./scripts/compose_smoke.sh
      - name: WebUI Kairyu smoke
        run: ./scripts/webui_smoke.sh

  kind-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          install_only: true
      - name: kind smoke (m10a D5)
        run: bash scripts/kind_smoke.sh
